{% extends "base.html" %}
{% block title %}Aloqa{% endblock %}
{% block content %}
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-700">Biz bilan bog'laning</h1>
        
        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
            <form action="{{ url_for('contact') }}" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">To'liq ismingiz</label>
                    <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Ali Valiyev">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email manzilingiz</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="example@gmail.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mavzu</label>
                    <input type="text" name="subject" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Sotib olish haqida">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Xabar matni</label>
                    <textarea name="message" rows="5" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Xabaringizni yozing..."></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition flex items-center justify-center gap-2 shadow-lg">
                    <i data-lucide="send"></i> Yuborish
                </button>
            </form>
        </div>
    </div>
{% endblock %}
