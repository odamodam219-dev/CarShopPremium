{% extends "base.html" %}
{% block title %}Ro'yxatdan o'tish{% endblock %}
{% block content %}
    <div class="max-w-md mx-auto mt-12">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">Yangi profil yaratish</h1>
            <form action="{{ url_for('register') }}" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">To'liq ismingiz</label>
                    <input type="text" name="fullname" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Masalan: Aziz Rahimov">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="example@mail.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Parol yaratish</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Kamida 8 belgi">
                </div>
                <div class="text-xs text-gray-500">
                    Ro'yxatdan o'tish orqali siz bizning <a href="#" class="text-blue-600 hover:underline">Foydalanish shartlarimizga</a> rozilik bildirasiz.
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition shadow-lg">
                    Ro'yxatdan o'tish
                </button>
            </form>
            <p class="text-center mt-6 text-sm text-gray-500">
                Profilingiz bormi? <a href="{{ url_for('login') }}" class="text-blue-600 font-semibold hover:underline">Kirish</a>
            </p>
        </div>
    </div>
{% endblock %}
