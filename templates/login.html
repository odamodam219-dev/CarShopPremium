{% extends "base.html" %}
{% block title %}Kirish{% endblock %}
{% block content %}
    <div class="max-w-md mx-auto mt-12">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">Tizimga kirish</h1>
            <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Emailingiz">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Parol</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="********">
                </div>
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600"> Eslab qolish
                    </label>
                    <a href="#" class="text-blue-600 hover:underline">Parolni unutdingizmi?</a>
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition shadow-lg">
                    Kirish
                </button>
            </form>
            <p class="text-center mt-6 text-sm text-gray-500">
                Profilingiz yo'qmi? <a href="{{ url_for('register') }}" class="text-blue-600 font-semibold hover:underline">Ro'yxatdan o'ting</a>
            </p>
        </div>
    </div>
{% endblock %}
